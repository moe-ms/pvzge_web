<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">

  <meta name="description" content="Play Plants vs Zombies 2 online for free! No download or installation required. Protect your garden directly in your browser.">
  <meta property="og:image" content="https://play.pvzol.com/poster.jpg">
  <link rel="icon" type="image/png" sizes="128x128" href="/logo.png">

  <meta name="viewport"
    content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true" />

  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="stylesheet" type="text/css" href="style.css" />

  <script>
    (function () {
      const isGitHubPages = window.location.hostname === 'play.pvzge.com';

      if (isGitHubPages) {
        // 仅加载 Google Adsense
        const adsenseScript = document.createElement('script');
        adsenseScript.async = true;
        adsenseScript.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9370487100321510';
        adsenseScript.crossOrigin = 'anonymous';
        document.head.appendChild(adsenseScript);

    })();

</head>

  <script src="tmpPatch.js"></script>
</body>

</html>
